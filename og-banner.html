<!DOCTYPE html>
<!-- Source for public/banner.png (1200x630 OG/social preview).
     Regenerate: chrome --headless --screenshot=public/banner.png \
       --window-size=1200,630 --force-device-scale-factor=1 og-banner.html -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --board:#0d0b07; --bill:#1a1610; --bill-edge:#2e2719;
    --gold:#c9a35b; --gold-bright:#ecca82; --gold-dim:#8a7038; --gold-deep:#5e4a22;
    --parchment:#efe6d0; --ink:#cdbf9f; --ink-dim:#8f846a;
    --rank-s:#d6483a; --rank-a:#b07ce0; --rank-b:#54b98a;
    --fd:'Cinzel',Georgia,serif; --fb:'Manrope',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:1200px;height:630px;overflow:hidden;}
  body{font-family:var(--fb);}

  .banner{
    position:relative; width:1200px; height:630px; overflow:hidden;
    background:
      radial-gradient(80% 90% at 50% -10%, rgba(201,163,91,0.16), transparent 55%),
      radial-gradient(90% 120% at 100% 120%, rgba(214,72,58,0.10), transparent 60%),
      linear-gradient(180deg, #1a160e 0%, #14110b 45%, #0d0b07 100%);
  }
  .banner::before{
    content:""; position:absolute; inset:0; z-index:0;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.018) 0 2px, transparent 2px 6px),
      repeating-linear-gradient(45deg, rgba(0,0,0,0.14) 0 1px, transparent 1px 7px);
    mix-blend-mode:overlay; opacity:.7;
  }
  .banner::after{
    content:""; position:absolute; inset:0; z-index:1;
    background:radial-gradient(120% 120% at 50% 42%, transparent 52%, rgba(0,0,0,0.6) 100%);
  }

  .watermark{
    position:absolute; z-index:0; right:-70px; top:50%; transform:translateY(-50%);
    width:620px; height:620px; opacity:.045; color:var(--gold-bright);
  }
  .watermark svg{width:100%;height:100%;}

  .frame{
    position:absolute; inset:22px; z-index:3; border-radius:12px;
    border:1.5px solid rgba(201,163,91,0.55);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4), inset 0 0 30px rgba(201,163,91,0.07);
  }
  .frame::before{ content:""; position:absolute; inset:6px; border-radius:8px; border:1px solid rgba(201,163,91,0.22); }
  .corner{position:absolute; width:30px; height:30px; z-index:4; color:var(--gold);}
  .corner svg{width:100%;height:100%;}
  .corner.tl{top:30px;left:30px;} .corner.tr{top:30px;right:30px;transform:scaleX(-1);}
  .corner.bl{bottom:30px;left:30px;transform:scaleY(-1);} .corner.br{bottom:30px;right:30px;transform:scale(-1,-1);}

  .content{
    position:absolute; inset:0; z-index:5;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:20px; padding:48px 64px; text-align:center;
  }

  .crest{ position:relative; width:168px; height:168px; display:grid; place-items:center; }
  .crest__rim{
    position:absolute; inset:0; border-radius:50%;
    background:conic-gradient(from 0deg, #ecca82, #8a7038 12%, #ecca82 25%, #5e4a22 37%, #ecca82 50%, #8a7038 62%, #ecca82 75%, #5e4a22 87%, #ecca82 100%);
    -webkit-mask:radial-gradient(circle, transparent 67px, #000 68px); mask:radial-gradient(circle, transparent 67px, #000 68px);
    box-shadow:0 0 30px rgba(201,163,91,0.4);
  }
  .crest__ticks{
    position:absolute; inset:11px; border-radius:50%;
    background:repeating-conic-gradient(var(--gold-dim) 0deg 1deg, transparent 1deg 9deg);
    -webkit-mask:radial-gradient(circle, transparent 63px, #000 64px, #000 69px, transparent 70px);
            mask:radial-gradient(circle, transparent 63px, #000 64px, #000 69px, transparent 70px);
    opacity:.5;
  }
  .crest__disc{
    position:relative; width:132px; height:132px; border-radius:50%; display:grid; place-items:center;
    background:radial-gradient(circle at 50% 34%, #2c2516 0%, #161208 70%, #100c06 100%);
    border:1.5px solid var(--gold-dim);
    box-shadow:inset 0 2px 14px rgba(0,0,0,0.8), inset 0 0 0 5px rgba(201,163,91,0.06);
  }
  .crest__glow{ position:absolute; inset:-14px; border-radius:50%; z-index:-1; background:radial-gradient(circle, rgba(201,163,91,0.45), transparent 68%); }
  .crest__disc svg{width:68px; height:68px; color:var(--gold-bright); filter:drop-shadow(0 2px 4px rgba(0,0,0,0.7));}

  .eyebrow{
    display:flex; align-items:center; gap:14px;
    font-family:var(--fb); font-size:17px; font-weight:700; letter-spacing:.46em; text-transform:uppercase; color:var(--gold);
  }
  .eyebrow .ln{height:1px; width:54px;}
  .eyebrow .ln.l{background:linear-gradient(90deg,transparent,var(--gold-dim));}
  .eyebrow .ln.r{background:linear-gradient(90deg,var(--gold-dim),transparent);}

  .title{
    font-family:var(--fd); font-weight:900; font-size:104px; line-height:.9; letter-spacing:.03em; margin:0; white-space:nowrap;
    background:linear-gradient(180deg, #fff4dc 4%, var(--gold-bright) 34%, var(--gold) 56%, #9c7c3e 92%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 2px 1px rgba(0,0,0,0.35);
  }
  .divider{display:flex; align-items:center; gap:14px; width:440px; color:var(--gold-dim);}
  .divider .ln{height:1px; flex:1;}
  .divider .ln.l{background:linear-gradient(90deg, rgba(138,112,56,0.15), var(--gold-dim));}
  .divider .ln.r{background:linear-gradient(90deg, var(--gold-dim), rgba(138,112,56,0.15));}
  .divider .dot{width:8px; height:8px; transform:rotate(45deg); background:var(--gold); box-shadow:0 0 8px rgba(201,163,91,0.6);}

  .sub{ font-family:var(--fb); font-size:20px; font-weight:600; letter-spacing:.24em; text-transform:uppercase; color:var(--ink-dim); margin:0; }
  .sub b{color:var(--parchment); font-weight:700;}

  .features{
    display:flex; align-items:center; gap:14px; margin-top:6px;
    font-family:var(--fb); font-size:16px; font-weight:600; letter-spacing:.06em; color:var(--ink);
  }
  .features .sep{width:5px; height:5px; border-radius:50%; background:var(--gold-dim);}
  .features b{color:var(--gold-bright); font-weight:700;}

  .seals{position:absolute; z-index:6; bottom:46px; right:62px; display:flex; gap:14px;}
  .seal{
    width:52px; height:52px; border-radius:50%; display:grid; place-items:center;
    font-family:var(--fd); font-weight:900; font-size:23px; color:var(--parchment);
    background:radial-gradient(circle at 50% 34%, color-mix(in srgb, var(--rc) 42%, #1a1610), #110e09 76%);
    border:2px solid var(--rc); box-shadow:0 0 16px var(--rg), inset 0 0 10px rgba(0,0,0,0.6); text-shadow:0 1px 3px rgba(0,0,0,0.8);
    position:relative;
  }
  .seal::after{content:""; position:absolute; inset:4px; border-radius:50%; border:1px solid color-mix(in srgb, var(--rc) 55%, transparent);}
  .seal.s{--rc:var(--rank-s); --rg:rgba(214,72,58,0.5);}
  .seal.a{--rc:var(--rank-a); --rg:rgba(176,124,224,0.45);}
  .seal.b{--rc:var(--rank-b); --rg:rgba(84,185,138,0.42);}

  .domain{
    position:absolute; z-index:6; bottom:50px; left:64px;
    font-family:var(--fb); font-size:18px; font-weight:700; letter-spacing:.14em; color:var(--gold); text-transform:lowercase;
  }
</style>
</head>
<body>
  <div class="banner" role="img" aria-label="Centurio Ledger — Final Fantasy XIV Hunt Tracker & Companion App">
    <div class="watermark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round">
        <path d="M12 2 4 5v6c0 5 3.4 8.3 8 11 4.6-2.7 8-6 8-11V5l-8-3Z" />
        <path d="M12 7v8M8.5 10.5 12 7l3.5 3.5" />
      </svg>
    </div>

    <div class="frame"></div>
    <div class="corner tl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 10V2h8M2 6c6 0 14 8 14 14"/></svg></div>
    <div class="corner tr"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 10V2h8M2 6c6 0 14 8 14 14"/></svg></div>
    <div class="corner bl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 10V2h8M2 6c6 0 14 8 14 14"/></svg></div>
    <div class="corner br"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 10V2h8M2 6c6 0 14 8 14 14"/></svg></div>

    <div class="content">
      <div class="crest">
        <div class="crest__glow"></div>
        <div class="crest__rim"></div>
        <div class="crest__ticks"></div>
        <div class="crest__disc">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
            <path d="M12 2 4 5v6c0 5 3.4 8.3 8 11 4.6-2.7 8-6 8-11V5l-8-3Z" />
            <path d="M12 7v8M8.5 10.5 12 7l3.5 3.5" />
          </svg>
        </div>
      </div>

      <div class="eyebrow"><span class="ln l"></span>The Hunt Board<span class="ln r"></span></div>
      <h1 class="title">CENTURIO&nbsp;LEDGER</h1>
      <div class="divider"><span class="ln l"></span><span class="dot"></span><span class="ln r"></span></div>
      <p class="sub"><b>Final Fantasy XIV</b> · Hunt Tracker &amp; Companion App</p>
      <div class="features">Hunts<span class="sep"></span>Fishing<span class="sep"></span>Mining<span class="sep"></span>Botany<span class="sep"></span><b>AI Search</b></div>
    </div>

    <div class="domain">ffxivlog.com</div>
    <div class="seals">
      <div class="seal s">S</div>
      <div class="seal a">A</div>
      <div class="seal b">B</div>
    </div>
  </div>
</body>
</html>
